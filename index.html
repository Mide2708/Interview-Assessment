<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Entry Specialist — Interview Assessment</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 900px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 18px; }
    label { display:block; margin-top: 14px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 10px; }
    textarea { min-height: 110px; }
    button { margin-top: 18px; padding: 12px 16px; border: 0; border-radius: 10px; cursor: pointer; }
    .row { display:flex; gap: 12px; }
    .row > div { flex: 1; }
  </style>
</head>
<body>

<h2>Data Entry Specialist — Interview Assessment Survey</h2>

<div class="card">

<form action="https://formsubmit.co/info@108holdingcompanyinc.com" method="POST">

  <input type="hidden" name="_subject" value="New Assessment Submission">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://mide2708.github.io/Interview-Assessment/thank-you.html">

  <input type="hidden" name="_autoresponse" value="Hi,

We’ve received your assessment, thank you for the quick turnaround.

Our team is reviewing submissions and will provide an update within 24–48 hours. We appreciate your continued interest and look forward to connecting soon.

Best,
Hiring Manager
108 HOLDING COMPANY, INC.">

  <div class="row">
    <div>
      <label>Full Name</label>
      <input type="text" name="Full Name" required>
    </div>
    <div>
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
  </div>

  <label>Years of data entry experience</label>
  <input type="number" name="Experience (Years)" required>

  <label>Typing speed (WPM)</label>
  <input type="number" name="Typing Speed (WPM)" required>

  <label>Tools used</label>
  <input type="text" name="Tools Used" required>

  <label>Spreadsheet level</label>
  <select name="Spreadsheet Level" required>
    <option>Beginner</option>
    <option>Intermediate</option>
    <option>Advanced</option>
  </select>

  <label>Accuracy & validation steps</label>
  <textarea name="Validation Steps" required></textarea>

  <label>Handling duplicates</label>
  <textarea name="Handling Duplicates" required></textarea>

  <label>Confidentiality approach</label>
  <textarea name="Confidentiality" required></textarea>

  <label>Scenario response</label>
  <textarea name="Scenario Response" required></textarea>

  <button type="submit">Submit Assessment</button>

</form>

</div>
</body>
</html>
